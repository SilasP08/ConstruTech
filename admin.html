<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>ConstruTech - Admin Dashboard</title>
</head>
<body>
    <header>
        <div class="logo-header">
            <img src="Imagem/logo_principal.png" alt="">
        </div>
        <div class="img-user-header">
            <img src="Imagem/login-user.jpg" alt="">
            <p>$nome</p>
        </div>
    </header>

    <main>
        <div class="menu-vertical-container">
            <div class="img-user">
                <img src="Imagem/login-user.jpg" alt="">
                <div class="name-user">Bem Vindo de volta $nome!</div>
            </div>
            <div class="menu-vertical">
                <nav class="">
                    <ul>
                        <li><i class="bi bi-bar-chart-line-fill"></i>Painel de Controle</li>
                        <li><i class="bi bi-archive-fill"></i>Estoque</li>
                        <li><i class="bi bi-receipt"></i>Vendas</li>
                        <li><i class="bi bi-person-vcard"></i>Funcionarios</li>
                    </ul>
                </nav> 
            </div>
            <div class="logout-btn">
                <i class="bi bi-box-arrow-right"></i><a href="#"></i>Logout</a>
            </div>
        </div>
    </main>
</body>
</html>
