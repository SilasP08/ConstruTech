<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/estoque.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>ConstruTech - Admin Dashboard</title>
</head>
<body>
    <header>
        <div class="logo-header">
            <img src="Imagem/logo_principal.png" alt="">
        </div>

        <div class="search-header">
            <input type="text" placeholder="Pesquisar...">
            <i class="bi bi-search"></i>
        </div>
        
        <div class="img-user-header">
            <img src="Imagem/login-user.jpg" alt="">
            <p>$nome</p>
        </div>
    </header>

    <main>
        <div class="menu-vertical-container">
            <div class="img-user">
                <img src="Imagem/login-user.jpg" alt="">
                <div class="name-user">Bem Vindo de volta $nome!</div>
            </div>
            <div class="menu-vertical">
                <nav class="">
                    <ul>
                        <li>
                            <a href="admin.html">
                                <i class="bi bi-bar-chart-line-fill"></i> Painel de Controle
                            </a>
                        </li>

                        <li class="active">
                            <a href="estoque.html">
                                <i class="bi bi-archive-fill"></i> Estoque
                            </a>
                        </li>

                        <li>
                            <a href="vendas.html">
                                <i class="bi bi-receipt"></i> Vendas
                            </a>
                        </li>

                        <li>
                            <a href="funcionarios.html">
                                <i class="bi bi-person-vcard"></i>Funcionarios
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="logout-btn">
                    <i class="bi bi-box-arrow-right"></i><a href="#">Logout</a>
                </div>
            </div>
        </div>

        <h1>Estoque</h1>

        <div class="estoque-header">
            <input type="text" id="searchProduto" placeholder="Buscar produto...">
            <button><i class="bi bi-plus"></i> Adicionar</button>
        </div>

        <table class="tabela-estoque">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaProdutos"></tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx1 = document.getElementById('vendasChart');

        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
                datasets: [{
                    label: 'Vendas (R$)',
                    data: [1200, 1900, 3000, 2500, 2200, 3200],
                    borderWidth: 2,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true
            }
        });
        
        const ctx2 = document.getElementById('estoqueChart');

        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Cimento', 'Areia', 'Brita', 'Tijolo'],
                datasets: [{
                    label: 'Quantidade',
                    data: [50, 80, 40, 100],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true
            }
        });
        
    </script>
</body>
</html>
