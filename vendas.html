<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/vendas.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>ConstruTech - Admin Dashboard</title>
</head>
<body>
    <header>
        <div class="logo-header">
            <img src="Imagem/logo_principal.png" alt="">
        </div>

        <div class="search-header">
            <input type="text" placeholder="Pesquisar...">
            <i class="bi bi-search"></i>
        </div>
        
        <div class="img-user-header">
            <img src="Imagem/login-user.jpg" alt="">
            <p>$nome</p>
        </div>
    </header>

    <main>
        <div class="menu-vertical-container">
            <div class="img-user">
                <img src="Imagem/login-user.jpg" alt="">
                <div class="name-user">Bem Vindo de volta $nome!</div>
            </div>
            <div class="menu-vertical">
                <nav class="">
                    <ul>
                        <li>
                            <a href="admin.html">
                                <i class="bi bi-bar-chart-line-fill"></i> Painel de Controle
                            </a>
                        </li>

                        <li>
                            <a href="estoque.html">
                                <i class="bi bi-archive-fill"></i> Estoque
                            </a>
                        </li>

                        <li class="active">
                            <a href="vendas.html">
                                <i class="bi bi-receipt"></i> Vendas
                            </a>
                        </li>

                        <li>
                            <a href="funcionarios.html">
                                <i class="bi bi-person-vcard"></i>Funcionarios
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="logout-btn">
                    <i class="bi bi-box-arrow-right"></i><a href="#">Logout</a>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="content-title">
                <h2>Vendas</h2>
                <span>ConstruTech</span>
            </div>
            <div class="list-container">
                <div class="current-sales">
                    <div class="current-sales-title">
                        <h2>Vendas Em Andamento</h2>
                    </div>

                    <div class="linha">
                        <div class="pedido">00001</div>
                        <div class="comprador">Claudio Almeida</div>
                        <div class="status">Aprovado</div>
                        <div class="produto">Martelo</div>
                        <div class="vendedor">Vicente Souza</div>
                        <div class="preco-total">R$ 645,00</div>
                    </div>
                </div>

                <div class="sales-history">
                    <div class="sales-history-title">
                        <h2>Histórico de Vendas</h2>
                    </div>
                    
                    <div class="linha"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p><i class="bi bi-c-circle"></i> ConstruTech - 2026</p>
    </footer>
</body>
</html>
